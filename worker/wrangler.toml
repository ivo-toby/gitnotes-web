name = "gitnotes-auth"
main = "src/index.ts"
compatibility_date = "2024-06-05"
compatibility_flags = ["nodejs_compat"]

# Environment variables to be set via `wrangler secret put`:
# GITHUB_CLIENT_ID - Public OAuth App client ID
# GITHUB_CLIENT_SECRET - Private OAuth App client secret
# GITHUB_REDIRECT_URI - The callback URL registered with GitHub

[vars]
# Default values for development (users should set their own via secrets)
GITHUB_REDIRECT_URI = "https://your-worker-subdomain.pages.dev/callback"

# Note: GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET should be set via:
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET
